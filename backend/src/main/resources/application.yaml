# ==========================================
# Spring Boot Application
# ==========================================
spring:
  application:
    name: enterpriseai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/enterpriseai
    username: enterpriseai
    password: enterpriseai

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ==========================================
# Embedded Server Configuration
# ==========================================
server:
  port: 8080

qdrant:
  base-url: http://localhost:6333
  collection-name: enterpriseai-documents

# ==========================================
# Spring Boot Actuator
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==========================================
# Logging Configuration
# ==========================================
logging:
  level:
    org.springframework: INFO
    com.enterpriseai: DEBUG

# ==========================================
# JWT Configuration
# ==========================================
jwt:
  secret: 4A8F4F6D1B0E0A0F5C8D3A2B7F8E9D6C4A1E5B7C9D0F2A4E6B8C1D3F5A7E9B2C
  expiration: 86400000

# ==========================================
# Ollama Configuration
# ==========================================
ollama:
  base-url: http://127.0.0.1:11434

  chat-model: llama3.2:3b

  embedding-model: nomic-embed-text:latest

  timeout: 60s