<div class="chat-card">

  <h3>💬 AI Assistant</h3>

  <p class="chat-description">

    Ask anything about your uploaded documents.

  </p>

  <div class="chat-input">

    <input
      type="text"
      [(ngModel)]="question"
      (keyup.enter)="ask()"
      placeholder="Ask a question about your documents">

    <button
      type="button"
      (click)="ask()"
      [disabled]="loading">

      {{ loading ? 'Thinking...' : 'Ask' }}

    </button>

  </div>

  <div
    class="chat-history"
    *ngIf="messages.length > 0">

    <div
      class="chat-message"
      *ngFor="let message of messages">

      <div class="message-header">

        <span>

          👤 <strong>You</strong>

        </span>

        <small>

          {{ message.timestamp | date:'dd/MM/yyyy HH:mm:ss' }}

        </small>

      </div>

      <div class="user-message">

        {{ message.question }}

      </div>

      <div class="message-header">

        <span>

          🤖 <strong>EnterpriseAI</strong>

        </span>

      </div>

      <div class="ai-message">

        {{ message.answer }}

      </div>

      <div class="sources">

        <strong>📄 Sources</strong>

        <ul>

          <li *ngFor="let source of message.sources">

            {{ source }}

          </li>

        </ul>

      </div>

    </div>

  </div>

</div>
