<div>

  <h3>AI Assistant</h3>

  <input
    type="text"
    [(ngModel)]="question"
    (keyup.enter)="ask()"
    placeholder="Ask a question about your documents">

  <button
    type="button"
    (click)="ask()"
    [disabled]="loading">

    {{ loading ? 'Thinking...' : 'Ask' }}

  </button>

  <hr>

  <div
    class="chat-history"
    *ngIf="messages.length > 0">

    <div
      class="chat-message"
      *ngFor="let message of messages">

      <h4>

        👤 You

        <small>

          {{ message.timestamp | date:'dd/MM/yyyy HH:mm:ss' }}

        </small>

      </h4>

      <p>

        {{ message.question }}

      </p>

      <h4>

        🤖 EnterpriseAI

      </h4>

      <p>

        {{ message.answer }}

      </p>

      <h4>

        Sources

      </h4>

      <ul>

        <li *ngFor="let source of message.sources">

          {{ source }}

        </li>

      </ul>

      <hr>

    </div>

  </div>

</div>
