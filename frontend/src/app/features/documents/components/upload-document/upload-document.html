<div class="upload-card">

  <h3>

    <mat-icon>

      cloud_upload

    </mat-icon>

    Upload Document

  </h3>

  <p class="upload-description">

    Upload PDF documents to extend your enterprise knowledge base.

  </p>

  <div
    class="drop-zone"
    [class.has-file]="selectedFile"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)">

    <mat-icon class="drop-icon">

      cloud_upload

    </mat-icon>

    <p>

      Drag & Drop your PDF here

    </p>

    <span>

      or

    </span>

    <input
      #fileInput
      type="file"
      accept=".pdf"
      (change)="onFileSelected($event)"
      hidden>

    <button
      type="button"
      class="choose-button"
      (click)="fileInput.click()"
      [disabled]="uploading">

      Choose File

    </button>

    @if (selectedFile) {

      <div class="selected-file success">

        <mat-icon>

          check_circle

        </mat-icon>

        <span>

          {{ selectedFileName }}

        </span>

      </div>

    } @else {

      <p class="selected-file">

        No file selected

      </p>

    }

  </div>

  @if (selectedFile) {

    <button
      type="button"
      class="upload-button"
      (click)="upload()"
      [disabled]="uploading">

      @if (uploading) {

        <mat-icon>

          hourglass_top

        </mat-icon>

      }

      {{ uploading ? 'Uploading...' : 'Upload Document' }}

    </button>

  }

</div>
