<div>

  <h3 class="section-title">

    <mat-icon>

      folder

    </mat-icon>

    My Documents

  </h3>

  <div
    class="empty-state"
    *ngIf="documents.length === 0">

    <mat-icon>

      folder_open

    </mat-icon>

    <p>

      No documents uploaded yet.

    </p>

  </div>

  <div
    class="document-list"
    *ngIf="documents.length > 0">

    <div
      class="document-card"
      *ngFor="let document of documents">

      <div class="document-content">

        <h4>

          {{ document.filename }}

        </h4>

        <div class="document-info">

          <span>

            <strong>Type:</strong>

            {{ document.contentType }}

          </span>

          <span>

            <strong>Size:</strong>

            {{ formatSize(document.size) }}

          </span>

          <span>

            <strong>Uploaded:</strong>

            {{ document.uploadedAt | date:'dd/MM/yyyy HH:mm' }}

          </span>

        </div>

      </div>

      <div class="document-actions">

        <button
          type="button"
          class="download-button"
          (click)="downloadDocument(document)">

          <mat-icon>

            download

          </mat-icon>

          Download

        </button>

        <button
          type="button"
          class="delete-button"
          (click)="deleteDocument(document.id)">

          <mat-icon>

            delete

          </mat-icon>

          Delete

        </button>

      </div>

    </div>

  </div>

</div>
