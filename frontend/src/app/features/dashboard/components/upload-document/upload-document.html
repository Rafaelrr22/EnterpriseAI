<div class="upload-card">

  <h3>📤 Upload Document</h3>

  <p class="upload-description">
    Upload PDF documents to extend your enterprise knowledge base.
  </p>

  <div
    class="drop-zone"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)">

    <div class="drop-icon">
      📄
    </div>

    <p>
      Drag & Drop your PDF here
    </p>

    <span>
      or
    </span>

    <input
      #fileInput
      type="file"
      accept=".pdf"
      (change)="onFileSelected($event)"
      hidden>

    <button
      type="button"
      class="choose-button"
      (click)="fileInput.click()"
      [disabled]="uploading">

      Choose File

    </button>

    <p class="selected-file">
      {{ selectedFileName }}
    </p>

  </div>

  <button
    type="button"
    class="upload-button"
    (click)="upload()"
    [disabled]="!selectedFile || uploading">

    {{ uploading ? 'Uploading...' : 'Upload' }}

  </button>

</div>
